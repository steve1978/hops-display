<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On Tap — Staff</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Indie Hops logo">
        <circle cx="50" cy="50" r="49" fill="#0d4a2a" />
        <g font-family="Anton, sans-serif" font-size="50" text-anchor="middle">
          <text x="52" y="68" fill="#a9822b">IH</text>
          <text x="50" y="66" fill="#f3ecda">IH</text>
        </g>
      </svg>
      <div class="brand-text">
        <span class="mark">INDIE<span class="hl"> HOPS</span></span>
        <span class="tagline">Staff Console</span>
      </div>
    </div>
    <div>
      <a class="btn" href="index.html" target="_blank">↗ View screen</a>
      <button class="btn" id="logoutBtn" style="display:none">Log out</button>
    </div>
  </header>

  <div class="wrap">
    <!-- LOGIN -->
    <section class="panel login-card" id="loginPanel">
      <h2>Staff Login</h2>
      <label class="fld">Username</label>
      <input class="inp" id="loginUser" autocomplete="username" />
      <label class="fld">Password</label>
      <input class="inp" id="loginPass" type="password" autocomplete="current-password" />
      <button class="btn btn-accent btn-block" id="loginBtn">Log in</button>
    </section>

    <!-- CONSOLE -->
    <div id="console" style="display:none">
      <section class="panel">
        <h2>Add / Replace a beer</h2>
        <div class="row">
          <div class="grow">
            <label class="fld">Search Untappd (e.g. "weetwood turncoat")</label>
            <input class="inp" id="searchInput" placeholder="brewery + beer name" style="margin-bottom:0" />
          </div>
          <button class="btn btn-accent" id="searchBtn">Search</button>
        </div>
        <div class="results" id="results"></div>
      </section>

      <section class="panel">
        <h2>Current taps</h2>
        <div class="slots" id="slots"></div>
        <div style="margin-top:18px">
          <button class="btn btn-accent" id="saveBtn">Publish to screen</button>
          <span class="muted" id="saveHint" style="margin-left:10px"></span>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
