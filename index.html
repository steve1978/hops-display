<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On Tap</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="tv">
  <script>
    // Set the layout class before paint so phones don't flash the TV layout.
    (function () {
      var m = window.innerWidth < 820 ||
        (window.matchMedia("(pointer: coarse)").matches &&
          Math.min(window.innerWidth, window.innerHeight) < 820);
      document.body.className = m ? "mobile" : "tv";
    })();
  </script>
  <div class="stage">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo-img" src="logo.png" alt="Indie Hops" />
      </div>
      <a class="btn" href="admin.html">⚙ Staff Login</a>
    </header>

    <main class="grid" id="grid">
      <!-- taps injected here -->
    </main>

    <footer class="footer-bar">
      <div class="foot-spacer"></div>
      <div class="footer-strip" id="footer">Updated just now</div>
      <div class="qr-badge">
        <span class="qr-cap">Scan for<br>what's on</span>
        <img src="QR.png" alt="Scan to see what's on tap" />
      </div>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/display.js"></script>
</body>
</html>
